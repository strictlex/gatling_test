  #       reservations:
  #         memory: 128M

  graphite-exporter:
    image: prom/graphite-exporter:latest
    container_name: graphite-exporter
    networks:
      - monitoring-net
    command:
      - "--graphite.listen-address=:2003"
      - "--web.listen-address=:9108"
    ports:
      - "2003:2003/tcp"
      - "9108:9108"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
